name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Julia ${{ matrix.version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Restrict CI to Julia 1.12 to save time and ensure reproducible builds
        version: [ '1.12' ]
        os: [ ubuntu-latest, macOS-latest ]
        include: []

    steps:
      - uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: ${{ matrix.version }}
          arch: x64

      - name: Cache registries and packages
        uses: julia-actions/cache@v1

      - name: Install project dependencies
        run: julia --project=. -e "using Pkg; Pkg.instantiate(); Pkg.precompile()"

      - name: Run tests
        run: julia --project=. -e "using Pkg; Pkg.test(coverage=false)"
